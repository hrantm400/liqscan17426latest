  <line x1="33" y1="40" x2="33" y2="65" stroke="#64748B" stroke-width="4" stroke-linecap="round" />
  <rect x="28" y="47" width="10" height="12" rx="2" fill="#64748B" />
  
  <line x1="50" y1="25" x2="50" y2="75" stroke="#13ec37" stroke-width="4" stroke-linecap="round" />
  <rect x="44" y="35" width="12" height="26" rx="3" fill="#13ec37" />
  
  <line x1="67" y1="35" x2="67" y2="55" stroke="#64748B" stroke-width="4" stroke-linecap="round" />
  <rect x="62" y="42" width="10" height="10" rx="2" fill="#64748B" />

